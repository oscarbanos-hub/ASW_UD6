<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cursos - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <nav class="navbar navbar-dark admin-navbar px-3">
        <a class="navbar-brand" href="index.html">Panel Admin</a>
        <div>
            <span class="text-light me-3">Hola, <span id="admin-nombre"></span></span>
            <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesion()">Salir</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Gestión de Cursos</h2>
            <button class="btn btn-primary" id="btn-nuevo">Nuevo curso</button>
        </div>
        <table class="table table-striped tabla-admin">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Categoría</th>
                    <th>Nivel</th>
                    <th>Duración</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-cursos">
            </tbody>
        </table>
    </div>

    <!-- modal curso -->
    <div class="modal fade" id="modalCurso" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCursoTitulo">Nuevo Curso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="curso-id">
                    <div class="mb-2">
                        <label class="form-label">Título</label>
                        <input type="text" class="form-control" id="curso-titulo">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Categoría</label>
                        <select class="form-select" id="curso-categoria">
                            <option value="Develop">Develop</option>
                            <option value="Programación">Programación</option>
                            <option value="Negocio">Negocio</option>
                            <option value="Seguridad Informática">Seguridad Informática</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Nivel</label>
                        <select class="form-select" id="curso-nivel">
                            <option value="Inicial">Inicial</option>
                            <option value="Medio">Medio</option>
                            <option value="avanzado">Avanzado</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Duración (horas)</label>
                        <input type="number" class="form-control" id="curso-duracion">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" id="curso-descripcion" rows="2"></textarea>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Temario</label>
                        <!-- TODO: esto deberia ser un textarea o algo mas grande, de momento lo dejamos asi -->
                        <input type="text" class="form-control" id="curso-temario">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Profesor</label>
                        <select class="form-select" id="curso-profesorID">
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btn-guardar-curso">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../resources/js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-cursos.js"></script>
</body>
</html>
